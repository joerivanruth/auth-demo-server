name: Pytest
on: push
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mclient
        uses: MonetDB/install-monetdb@v0.8
        with:
          start: "false"

      - name: Download jdbcclient jar
        run: curl -sSf -O https://www.monetdb.org/downloads/Java/jdbcclient.jre8.jar

      - name: Install pymonetdb
        run: pip3 install --user --upgrade pymonetdb cryptography pytest

      - name: Run pytest
        run: FORCE_TESTS=most CLASSPATH=jdbcclient.jre8.jar pytest -v

      - name: Start MonetDB
        run: |
          monetdbd create /tmp/farm
          monetdbd start /tmp/farm
          monetdb create -pmonetdb demo
          monetdb start demo

      - name: Run democlient
        run: ./democlient.py -v monetdb:///demo

      - name: Switch MonetDB to redirect mode
        run: |
          monetdbd stop /tmp/farm
          monetdbd set forward=redirect /tmp/farm
          monetdbd start /tmp/farm

      - name: Run democlient in redirect mode
        run: ./democlient.py -v monetdb:///demo
